<!DOCTYPE html>
<html>
<head>
    <title>EV Pro Tracker - Admin Mode</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; text-align: center; background: #1a1a1a; color: white; font-family: sans-serif; overflow: hidden; }
        #camera-container { position: relative; width: 100vw; height: 100vh; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* UI Overlays */
        #header-ui { position: fixed; top: 0; width: 100%; z-index: 10; background: rgba(0,0,0,0.8); padding: 10px 0; border-bottom: 2px solid #3498db; }
        #job-input { padding: 10px; width: 80%; border-radius: 5px; border: 1px solid #3498db; background: #222; color: white; font-size: 16px; margin-bottom: 5px; }
        
        #crosshair { position: absolute; top: 50%; left: 50%; width: 30px; height: 30px; transform: translate(-50%, -50%); pointer-events: none; border: 2px solid #3498db; border-radius: 50%; }
        #crosshair::after { content: ''; position: absolute; top: 14px; left: 0; width: 100%; height: 2px; background: #3498db; }
        #crosshair::before { content: ''; position: absolute; left: 14px; top: 0; height: 100%; width: 2px; background: #3498db; }

        #total-display { font-size: 24px; color: #2ecc71; font-weight: bold; margin-top: 5px; }
        
        #ui-controls { position: fixed; bottom: 20px; width: 100%; z-index: 10; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .btn-row { display: flex; width: 90%; gap: 10px; }
        .btn { padding: 16px; font-size: 16px; font-weight: bold; border-radius: 12px; border: none; cursor: pointer; color: white; transition: 0.2s; }
        
        #addBtn { background: #3498db; flex: 2; }
        #resetBtn { background: #e74c3c; flex: 1; } /* Red for Reset */
        #vertBtn { background: #9b59b6; width: 90%; }
        #finishBtn { background: #2ecc71; width: 90%; }
        
        .btn:active { transform: scale(0.95); opacity: 0.8; }
    </style>
</head>
<body>

    <div id="header-ui">
        <input type="text" id="job-input" placeholder="Enter Customer Name or Job #" autocomplete="off">
        <div id="total-display">TOTAL: <span id="total-val">0.00</span>m</div>
    </div>

    <div id="camera-container">
        <video id="webcam" autoplay playsinline></video>
        <div id="crosshair"></div>
    </div>

    <div id="ui-controls">
        <div class="btn-row">
            <button id="addBtn" class="btn">ADD FLOOR POINT</button>
            <button id="resetBtn" class="btn">RESET</button>
        </div>
        <button id="vertBtn" class="btn">+ ADD 2.5m VERTICAL</button>
        <button id="finishBtn" class="btn">FINISH & SAVE TO SHEET</button>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const totalDisplay = document.getElementById('total-val');
        const jobInput = document.getElementById('job-input');
        
        let cameraHeight = 1.6; 
        let totalPathLength = 0;
        let lastPoint = null;
        let currentTilt = 0;
        let currentRotation = 0;

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(s => video.srcObject = s);

        window.addEventListener('deviceorientation', (e) => {
            currentTilt = e.beta;
            currentRotation = e.alpha;
        }, true);

        // RESET FUNCTION
        document.getElementById('resetBtn').onclick = () => {
            if(confirm("Clear current measurement and start over?")) {
                totalPathLength = 0;
                lastPoint = null;
                totalDisplay.innerText = "0.00";
            }
        };

        // Add Ground Segment
        document.getElementById('addBtn').onclick = () => {
            let angleRad = currentTilt * (Math.PI / 180);
            let distToPoint = Math.abs(cameraHeight * Math.tan(angleRad));
            let newPoint = { d: distToPoint, r: currentRotation };

            if (lastPoint) {
                let angleDiff = Math.abs(lastPoint.r - newPoint.r) * (Math.PI / 180);
                let segmentLength = Math.sqrt(Math.pow(lastPoint.d, 2) + Math.pow(newPoint.d, 2) - 2 * lastPoint.d * newPoint.d * Math.cos(angleDiff));
                totalPathLength += segmentLength;
                totalDisplay.innerText = totalPathLength.toFixed(2);
            }
            lastPoint = newPoint;
        };

        // Add Vertical Run
        document.getElementById('vertBtn').onclick = () => {
            totalPathLength += 2.5;
            totalDisplay.innerText = totalPathLength.toFixed(2);
        };

        // Final Save
        document.getElementById('finishBtn').onclick = () => {
            const jobName = jobInput.value.trim();
            if (!jobName) return alert("Please enter a Customer Name first!");
            if (totalPathLength === 0) return alert("No measurement recorded.");
            
            let finalValue = (totalPathLength * 1.10).toFixed(2); 
            
            if(confirm(`Save ${finalValue}m for ${jobName}?`)) {
                sendToServer(jobName, finalValue);
            }
        };

        function sendToServer(job, val) {
            const scriptURL = 'https://script.google.com/macros/s/AKfycbwLI_UP4Zjn2WoKhojrOYKMkAQx7ximSuo1iJY2m9UhEZVe007qa5PUE3iRTVGFxWtp/exec'; 
            
            const payload = {
                clientId: job,
                measurement: val
            };

            fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            }).then(() => {
                alert("Successfully saved!");
                totalPathLength = 0;
                lastPoint = null;
                totalDisplay.innerText = "0.00";
                jobInput.value = "";
            }).catch(err => alert("Error: " + err));
        }
    </script>
</body>
</html>
