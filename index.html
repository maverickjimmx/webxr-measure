<!DOCTYPE html>
<html>
<head>
    <title>EV Pro Cable Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; text-align: center; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        #camera-container { position: relative; width: 100vw; height: 100vh; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 30px; height: 30px; transform: translate(-50%, -50%); pointer-events: none; border: 2px solid #3498db; border-radius: 50%; }
        #status { padding: 15px; background: rgba(0,0,0,0.8); position: fixed; top: 0; width: 100%; z-index: 10; border-bottom: 2px solid #3498db; }
        #total-display { font-size: 28px; color: #2ecc71; font-weight: bold; }
        #ui { position: fixed; bottom: 20px; width: 100%; z-index: 10; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .btn { padding: 18px; width: 90%; font-size: 16px; font-weight: bold; border-radius: 12px; border: none; cursor: pointer; color: white; }
        #addBtn { background: #3498db; }
        #vertBtn { background: #9b59b6; } /* Purple for Vertical */
        #finishBtn { background: #2ecc71; }
    </style>
</head>
<body>

    <div id="status">
        TOTAL CABLE: <span id="total-display">0.00</span>m<br>
        <small id="instruction">Aim at Point A and click 'Add'</small>
    </div>

    <div id="camera-container">
        <video id="webcam" autoplay playsinline></video>
        <div id="crosshair"></div>
    </div>

    <div id="ui">
        <button id="addBtn" class="btn">ADD FLOOR POINT</button>
        <button id="vertBtn" class="btn">+ ADD 2.5m VERTICAL RUN</button>
        <button id="finishBtn" class="btn">FINISH & SAVE TO SHEET</button>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const totalDisplay = document.getElementById('total-display');
        const instruction = document.getElementById('instruction');
        
        let cameraHeight = 1.6; // Update to your eye-level height
        let totalPathLength = 0;
        let lastPoint = null;
        let currentTilt = 0;
        let currentRotation = 0;

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(s => video.srcObject = s);

        window.addEventListener('deviceorientation', (e) => {
            currentTilt = e.beta;
            currentRotation = e.alpha;
        }, true);

        // FLOOR MEASUREMENT
        document.getElementById('addBtn').onclick = () => {
            let angleRad = currentTilt * (Math.PI / 180);
            let distToPoint = Math.abs(cameraHeight * Math.tan(angleRad));
            let newPoint = { d: distToPoint, r: currentRotation };

            if (lastPoint) {
                let angleDiff = Math.abs(lastPoint.r - newPoint.r) * (Math.PI / 180);
                let segmentLength = Math.sqrt(Math.pow(lastPoint.d, 2) + Math.pow(newPoint.d, 2) - 2 * lastPoint.d * newPoint.d * Math.cos(angleDiff));
                totalPathLength += segmentLength;
                totalDisplay.innerText = totalPathLength.toFixed(2);
                instruction.innerText = "Segment Added!";
            } else {
                instruction.innerText = "Point A set. Now aim at Point B.";
            }
            lastPoint = newPoint;
        };

        // VERTICAL ADDER
        document.getElementById('vertBtn').onclick = () => {
            totalPathLength += 2.5; // Adds standard wall height
            totalDisplay.innerText = totalPathLength.toFixed(2);
            alert("Added 2.5m vertical drop/rise.");
        };

        document.getElementById('finishBtn').onclick = () => {
            if (totalPathLength === 0) return alert("No measurement recorded.");
            
            let finalValue = (totalPathLength * 1.10).toFixed(2); // 10% safety margin
            
            if(confirm(`Total: ${finalValue}m (incl. 10% slack). Save?`)) {
                sendToServer(finalValue);
                totalPathLength = 0;
                lastPoint = null;
                totalDisplay.innerText = "0.00";
            }
        };

        function sendToServer(val) {
            const scriptURL = 'https://script.google.com/macros/s/AKfycbwLI_UP4Zjn2WoKhojrOYKMkAQx7ximSuo1iJY2m9UhEZVe007qa5PUE3iRTVGFxWtp/exec'; 
            fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ clientId: "EV_Job_Site", measurement: val })
            }).then(() => alert("Saved to Google Sheets!"));
        }
    </script>
</body>
</html>
