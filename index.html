<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>BOSS EV – B2B OIF (Full Pro)</title>
<style>
  :root {
    --bg: #0f172a; --panel: #1e293b; --text: #f1f5f9; --muted: #94a3b8;
    --good: #22c55e; --blue: #3b82f6; --danger: #ef4444; --purple: #a855f7;
    --outline: rgba(255,255,255,0.1); --radius: 12px;
  }
  body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; padding-bottom: 100px; -webkit-tap-highlight-color: transparent; }
  
  /* Sticky Progress Header */
  #progress-container {
    position: sticky; top: 0; z-index: 1000; 
    background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px);
    padding: 12px 20px; border-bottom: 1px solid var(--outline);
  }
  .prog-text-row { display: flex; justify-content: space-between; font-size: 11px; font-weight: bold; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .prog-track { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
  #progress-bar { height: 100%; width: 0%; background: var(--good); transition: width 0.4s ease; }

  .wrap { padding: 15px; max-width: 600px; margin: auto; }
  .section { background: #111827; padding: 18px; border-radius: var(--radius); border: 1px solid var(--outline); margin-bottom: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
  
  .step-badge {
    background: var(--blue); color: white; width: 22px; height: 22px; 
    display: inline-flex; align-items: center; justify-content: center; 
    border-radius: 50%; font-size: 11px; margin-right: 8px; vertical-align: middle;
  }

  h1 { font-size: 18px; color: var(--good); padding: 20px 15px 5px; margin: 0; text-align: center; }
  h2 { font-size: 15px; border-bottom: 1px solid var(--outline); padding-bottom: 8px; margin-top: 0; color: var(--blue); display: flex; align-items: center; }
  label { font-size: 10px; color: var(--muted); display: block; margin: 12px 0 4px; text-transform: uppercase; font-weight: bold; }
  input, select, textarea { width: 100%; padding: 12px; background: var(--panel); border: 1px solid var(--outline); color: #fff; border-radius: 8px; box-sizing: border-box; font-size: 14px; outline: none; }
  input:focus { border-color: var(--blue); }
  
  /* Tracker UI */
  .camBox { position: relative; background: #000; border-radius: 8px; overflow: hidden; aspect-ratio: 9/16; max-height: 380px; margin: 10px 0; border: 1px solid #334155; }
  video { width: 100%; height: 100%; object-fit: cover; }
  .overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
  .crosshair { width: 40px; height: 40px; border: 2px solid var(--good); border-radius: 50%; position: relative; }
  .crosshair::before { content:''; position:absolute; top:50%; left:20%; width:60%; height:2px; background:var(--good); }
  .crosshair::after { content:''; position:absolute; left:50%; top:20%; height:60%; width:2px; background:var(--good); }
  
  .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
  .metric-card { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; border: 1px solid var(--outline); text-align: center; }
  .big-num { font-size: 22px; font-weight: bold; color: var(--good); display: block; }
  
  .coach-bar { height: 8px; background: #334155; border-radius: 4px; margin: 10px 0; overflow: hidden; }
  .coach-fill { height: 100%; width: 0%; background: var(--good); transition: 0.3s; }
  .coach-fill.bad { background: var(--danger); }

  canvas { background: #fff; border-radius: 8px; width: 100%; touch-action: none; margin-top: 5px; cursor: crosshair; }
  .row { display: flex; gap: 10px; margin-bottom: 10px; }
  .row > div { flex: 1; }
  
  button { width: 100%; padding: 16px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin: 5px 0; transition: 0.2s; font-size: 14px; }
  button:active { transform: scale(0.98); }
  button:disabled { opacity: 0.3; filter: grayscale(1); cursor: not-allowed; }
  .primary { background: var(--good); color: #000; }
  .secondary { background: var(--blue); color: #fff; }
  .purple { background: var(--purple); color: #fff; }
  .danger-btn { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid var(--danger); }
</style>
</head>
<body>

<div id="progress-container">
  <div class="prog-text-row">
    <span id="progress-step-name">Step 1: Project Header</span>
    <span id="progress-percentage">0%</span>
  </div>
  <div class="prog-track"><div id="progress-bar"></div></div>
</div>

<h1>BOSS EV B2B Inspection</h1>

<div class="wrap">
  <div class="section">
    <h2><span class="step-badge">1</span>B2B Job Header</h2>
    <label>Client Company</label>
    <select id="client_company" onchange="updateProgress()">
      <option>FINSI</option>
      <option>Greenstrum</option>
    </select>

    <div class="row">
      <div><label>Site ID / Asset Code</label><input id="site_id" placeholder="MNL-001" oninput="updateProgress()"></div>
      <div><label>Project Ref (PO/NTP)</label><input id="project_ref" placeholder="PO#" oninput="updateProgress()"></div>
    </div>

    <div class="row">
      <div><label>Inspector Name</label><input id="inspector_name" oninput="updateProgress()"></div>
      <div><label>SLA Target Date</label><input type="date" id="sla_date" onchange="updateProgress()"></div>
    </div>
  </div>

  <div class="section">
    <h2><span class="step-badge">2</span>Client Information</h2>
    <label>Full Client Name</label><input id="client_name" oninput="updateProgress()">
    <label>Installation Address</label><input id="address" oninput="updateProgress()">
    <div class="row">
      <div><label>Contact Person</label><input id="contact_person" oninput="updateProgress()"></div>
      <div><label>Mobile / Email</label><input id="contact_details" oninput="updateProgress()"></div>
    </div>
    <label>Project Category</label>
    <select id="project_category" onchange="updateProgress()">
      <option>Residential</option><option>Condominium</option><option>Commercial</option>
    </select>
  </div>

  <div class="section">
    <h2><span class="step-badge">3</span>Cable Route Measurement</h2>
    <label>Device Height (Eye Level)</label>
    <select id="heightSel" onchange="updateProgress()"></select>
    
    <div class="camBox">
      <video id="video" playsinline autoplay muted></video>
      <div class="overlay"><div class="crosshair"></div></div>
    </div>
    <div class="coach-bar"><div id="coachFill" class="coach-fill"></div></div>
    <p id="coachText" style="font-size: 11px; text-align: center; color: var(--muted); margin: 5px 0;">Enable Camera to Start</p>

    <div class="metrics">
      <div class="metric-card"><span>Floor (m)</span><span class="big-num" id="floorM">0.00</span></div>
      <div class="metric-card"><span>Final (m)</span><span class="big-num" id="finalM">0.00</span></div>
    </div>

    <button class="secondary" id="btnEnable">ENABLE SENSORS</button>
    <div class="row">
      <button class="primary" id="btnAddPoint" disabled>ADD POINT</button>
      <button class="purple" id="btnAddVert">+ 2.5m VERT</button>
    </div>
    <button class="danger-btn" id="btnReset" style="padding: 8px; font-size: 11px;">RESET DISTANCE</button>
  </div>

  <div class="section">
    <h2><span class="step-badge">4</span>Electrical Checklist</h2>
    <div class="row">
      <div><label>Charger Type</label><select id="charger_type"><option>AC</option><option>DC</option></select></div>
      <div><label>Qty</label><input type="number" id="charger_qty" value="1"></div>
    </div>
    <label>Main Breaker Size (Amps)</label>
    <input type="number" id="main_breaker" placeholder="e.g. 60" oninput="updateProgress()">
    
    <div class="row">
      <div><label>Spare Breaker?</label><select id="spare_breaker"><option>None</option><option>Yes</option></select></div>
      <div><label>Busbar Space?</label><select id="busbar_space"><option>None</option><option>Yes</option></select></div>
    </div>

    <label>Voltage Readings (V)</label>
    <div class="row">
      <div><label>L1-N</label><input id="v_l1_n" oninput="updateProgress()"></div>
      <div><label>L2-N</label><input id="v_l2_n" oninput="updateProgress()"></div>
      <div><label>L3-N</label><input id="v_l3_n" oninput="updateProgress()"></div>
    </div>
    
    <label>Current Readings (A)</label>
    <div class="row">
      <div><label>L1</label><input id="i_l1" oninput="updateProgress()"></div>
      <div><label>L2</label><input id="i_l2" oninput="updateProgress()"></div>
      <div><label>L3</label><input id="i_l3" oninput="updateProgress()"></div>
    </div>
  </div>

  <div class="section">
    <h2><span class="step-badge">5</span>Review & Sign</h2>
    <label>Cable Path Sketch (Proposed)</label>
    <canvas id="sketch1" height="200"></canvas>
    <button class="secondary" style="padding: 8px; font-size: 11px;" onclick="clearCanvas('sketch1')">Clear Sketch</button>
    
    <label>Electrician Signature</label>
    <canvas id="signature" height="150"></canvas>
    <button class="secondary" style="padding: 8px; font-size: 11px;" onclick="clearCanvas('signature')">Clear Signature</button>
    
    <label>Design Recommendation</label>
    <textarea id="recommendation" rows="3" oninput="updateProgress()"></textarea>
  </div>

  <button class="primary" id="submitBtn" onclick="submitFullForm()" disabled style="font-size: 18px; height: 75px;">SUBMIT TO GOOGLE SHEETS</button>
  <p id="errorNote" style="text-align:center; font-size: 11px; color: var(--danger); margin-top: 10px;">Progress must be 100% to submit.</p>
</div>

<script>
// UPDATE THIS URL WITH YOUR DEPLOYED GOOGLE APPS SCRIPT URL
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbznkBTqngel2F66-wWJtVlrZMverQeJdlR1oHHjC1E8vOPdUpKYsWdGlYh_jCS7zrf8Fg/exec";

let state = { points: [], segments: [], vAdds: 0, pitch: 0, yaw: 0, hasSketched: false, hasSigned: false };
const BASE_VERT = 5.0;
const BUF = 0.15;

// Build Height List
const hSel = document.getElementById('heightSel');
for(let i=60; i<=75; i++){
    let opt = document.createElement('option');
    opt.value = (i*0.0254).toFixed(3);
    opt.text = Math.floor(i/12)+"'"+(i%12)+'"';
    if(i===68) opt.selected = true;
    hSel.appendChild(opt);
}

function updateProgress() {
    let score = 0;
    // Section 1 & 2 (30 pts)
    if(document.getElementById('site_id').value.length > 2) score += 10;
    if(document.getElementById('inspector_name').value.length > 2) score += 10;
    if(document.getElementById('client_name').value.length > 2) score += 10;
    // Section 3 (20 pts)
    if(state.points.length > 0) score += 20;
    // Section 4 (25 pts)
    if(document.getElementById('main_breaker').value > 0) score += 15;
    if(document.getElementById('v_l1_n').value.length > 1) score += 10;
    // Section 5 (25 pts)
    if(state.hasSketched) score += 15;
    if(state.hasSigned) score += 10;

    document.getElementById('progress-bar').style.width = score + "%";
    document.getElementById('progress-percentage').innerText = score + "%";
    
    const stepText = document.getElementById('progress-step-name');
    const submitBtn = document.getElementById('submitBtn');

    if(score < 30) stepText.innerText = "Step 1: Header Info";
    else if(score < 50) stepText.innerText = "Step 2: Measurement";
    else if(score < 75) stepText.innerText = "Step 3: Electrical Audit";
    else if(score < 100) stepText.innerText = "Step 4: Finalize";
    else stepText.innerText = "Ready to Submit!";

    submitBtn.disabled = (score < 100);
}

/** TRACKER LOGIC **/
async function initSensors() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
      document.getElementById('video').srcObject = stream;
      if (typeof DeviceOrientationEvent.requestPermission === 'function') {
          const res = await DeviceOrientationEvent.requestPermission();
          if(res==='granted') window.addEventListener('deviceorientation', handleOri);
      } else {
          window.addEventListener('deviceorientation', handleOri);
      }
      document.getElementById('btnEnable').style.display = "none";
    } catch(e) { alert("Enable camera in settings."); }
}

function handleOri(e) {
    state.pitch = Math.abs(e.beta);
    state.yaw = e.alpha;
    updateTrackerUI();
}

function updateTrackerUI() {
    const p = state.pitch;
    const isOk = p >= 15 && p <= 75;
    const fill = document.getElementById('coachFill');
    const text = document.getElementById('coachText');
    const btn = document.getElementById('btnAddPoint');
    fill.style.width = (p/90*100)+'%';
    fill.className = isOk ? 'coach-fill' : 'coach-fill bad';
    text.innerText = isOk ? "Aim at floor and Add Point" : "Adjust angle (15°-75°)";
    text.style.color = isOk ? "var(--good)" : "var(--danger)";
    btn.disabled = !isOk;
    const floor = state.segments.reduce((a,b)=>a+b, 0);
    const final = (floor + BASE_VERT + (state.vAdds*2.5)) * (1+BUF);
    document.getElementById('floorM').innerText = floor.toFixed(2);
    document.getElementById('finalM').innerText = final.toFixed(2);
}

document.getElementById('btnAddPoint').onclick = () => {
    const h = parseFloat(hSel.value) * 0.94;
    const r = h * Math.tan(state.pitch * (Math.PI/180));
    const curr = { r, yaw: state.yaw };
    if(state.points.length > 0) {
        const prev = state.points[state.points.length-1];
        const dY = Math.abs(curr.yaw - prev.yaw) * (Math.PI/180);
        const s = Math.sqrt(prev.r**2 + curr.r**2 - 2*prev.r*curr.r*Math.cos(dY));
        state.segments.push(s);
    }
    state.points.push(curr);
    updateTrackerUI(); updateProgress();
};

document.getElementById('btnAddVert').onclick = () => { state.vAdds++; updateTrackerUI(); updateProgress(); };
document.getElementById('btnReset').onclick = () => { state.points=[]; state.segments=[]; state.vAdds=0; updateTrackerUI(); updateProgress(); };
document.getElementById('btnEnable').onclick = initSensors;

/** CANVAS LOGIC **/
function initCanvas(id) {
    const canvas = document.getElementById(id);
    const ctx = canvas.getContext('2d');
    canvas.width = canvas.offsetWidth;
    let drawing = false;
    const start = (e) => { 
      drawing = true; ctx.beginPath();
      const r = canvas.getBoundingClientRect();
      ctx.moveTo((e.touches ? e.touches[0].clientX : e.clientX) - r.left, (e.touches ? e.touches[0].clientY : e.clientY) - r.top); 
    };
    const move = (e) => { 
      if(!drawing) return; e.preventDefault();
      const r = canvas.getBoundingClientRect();
      ctx.lineTo((e.touches ? e.touches[0].clientX : e.clientX) - r.left, (e.touches ? e.touches[0].clientY : e.clientY) - r.top); ctx.stroke(); 
      if(id==='sketch1') state.hasSketched = true; else state.hasSigned = true;
      updateProgress();
    };
    canvas.addEventListener('mousedown', start); canvas.addEventListener('mousemove', move); window.addEventListener('mouseup', ()=>drawing=false);
    canvas.addEventListener('touchstart', start); canvas.addEventListener('touchmove', move); window.addEventListener('touchend', ()=>drawing=false);
    ctx.lineWidth = 2; ctx.strokeStyle = "#000";
}
function clearCanvas(id) { 
  const c = document.getElementById(id); c.getContext('2d').clearRect(0,0,c.width,c.height); 
  if(id==='sketch1') state.hasSketched = false; else state.hasSigned = false;
  updateProgress();
}
initCanvas('sketch1'); initCanvas('signature');

/** SUBMISSION **/
async function submitFullForm() {
    const btn = document.getElementById('submitBtn');
    btn.disabled = true; btn.innerText = "UPLOADING...";

    const payload = {
        timestamp: new Date().toISOString(),
        client_company: document.getElementById('client_company').value,
        site_id: document.getElementById('site_id').value,
        project_ref: document.getElementById('project_ref').value,
        inspector_name: document.getElementById('inspector_name').value,
        sla_date: document.getElementById('sla_date').value,
        client_name: document.getElementById('client_name').value,
        address: document.getElementById('address').value,
        contact_person: document.getElementById('contact_person').value,
        contact_details: document.getElementById('contact_details').value,
        project_category: document.getElementById('project_category').value,
        charger_type: document.getElementById('charger_type').value,
        charger_model: "", // Empty for manual fill
        charger_qty: document.getElementById('charger_qty').value,
        system_voltage: "",
        main_breaker: document.getElementById('main_breaker').value,
        spare_breaker: document.getElementById('spare_breaker').value,
        busbar_space: document.getElementById('busbar_space').value,
        conduit_type: "",
        v_l1_l2: "", v_l2_l3: "", v_l3_l1: "",
        v_l1_n: document.getElementById('v_l1_n').value,
        v_l2_n: document.getElementById('v_l2_n').value,
        v_l3_n: document.getElementById('v_l3_n').value,
        i_l1: document.getElementById('i_l1').value,
        i_l2: document.getElementById('i_l2').value,
        i_l3: document.getElementById('i_l3').value,
        floor_m: document.getElementById('floorM').innerText,
        vertical_m: (BASE_VERT + state.vAdds*2.5).toFixed(2),
        final_m: document.getElementById('finalM').innerText,
        design_recommendation: document.getElementById('recommendation').value,
        sketch_existing: document.getElementById('sketch1').toDataURL(),
        signature: document.getElementById('signature').toDataURL()
    };
    
    fetch(APPS_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) })
    .then(() => { alert("SUCCESS: Saved to Cloud."); location.reload(); })
    .catch(() => { alert("FAILED: Check Connection."); btn.disabled = false; btn.innerText = "RETRY"; });
}
</script>
</body>
</html>
