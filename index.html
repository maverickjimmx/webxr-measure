<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Boss EV – EV Pro Tracker (v1)</title>
  <style>
    :root{
      --bg:#0b0f14;
      --panel:#111827;
      --panel2:#0f172a;
      --text:#e5e7eb;
      --muted:#9ca3af;
      --good:#22c55e;
      --bad:#ef4444;
      --warn:#f59e0b;
      --blue:#3b82f6;
      --purple:#a855f7;
      --red:#ef4444;
      --green:#22c55e;
      --outline:rgba(255,255,255,.08);
      --shadow: 0 10px 30px rgba(0,0,0,.35);
      --radius:16px;
      --btnRadius:14px;
      --tap: 48px;
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      background:linear-gradient(180deg,#070a0f 0%, #0b1220 100%);
      color:var(--text);
      -webkit-font-smoothing:antialiased;
      padding-bottom: calc(180px + env(safe-area-inset-bottom));
    }

    .wrap{ max-width: 720px; margin: 0 auto; padding: 12px 12px 0; }
    .card{ background: rgba(17,24,39,.85); border: 1px solid var(--outline); border-radius: var(--radius); box-shadow: var(--shadow); overflow:hidden; }
    .top{ padding: 12px; display:grid; gap:10px; }
    .row{ display:grid; grid-template-columns: 1fr; gap:10px; }
    .row.two{ grid-template-columns: 1fr 1fr; gap:10px; }
    label{ font-size:12px; color: var(--muted); display:block; margin-bottom:6px; }
    input, select{ width:100%; background: rgba(15,23,42,.85); color: var(--text); border: 1px solid var(--outline); border-radius: 12px; padding: 12px; font-size: 15px; outline:none; }
    input:focus, select:focus{ border-color: rgba(59,130,246,.6); box-shadow: 0 0 0 4px rgba(59,130,246,.15); }

    .metrics{ background: rgba(15,23,42,.85); border: 1px solid var(--outline); border-radius: 14px; padding: 10px 12px; display:grid; gap:6px; }
    .totalLine{ display:flex; justify-content:space-between; align-items:baseline; gap:12px; }
    .total{ font-size: 28px; font-weight: 800; letter-spacing: .3px; color: var(--good); }
    .unit{ color: var(--muted); font-weight:600; margin-left:6px; font-size:14px; }
    .sub{ font-size: 13px; color: var(--muted); display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap; }
    .pill{ display:inline-flex; align-items:center; gap:6px; padding: 6px 10px; border-radius: 999px; border:1px solid var(--outline); background: rgba(0,0,0,.18); font-size: 12px; color: var(--text); white-space:nowrap; }
    .dot{ width:8px; height:8px; border-radius:999px; background: var(--muted); transition: 0.3s; }

    .statusBar{ border-top: 1px dashed rgba(255,255,255,.10); padding-top: 8px; display:flex; gap:8px; flex-wrap:wrap; align-items:center; justify-content:space-between; }

    .coach{ display:grid; gap:8px; padding: 10px 12px 0; }
    .coachLine{ display:flex; align-items:center; justify-content:space-between; gap:12px; font-size:13px; color: var(--muted); }
    .bar{ height: 14px; border-radius: 999px; background: rgba(255,255,255,.07); border: 1px solid var(--outline); overflow:hidden; position:relative; }
    .barFill{ height:100%; width: 0%; background: var(--good); transition: width 0.3s, background-color .15s ease; }
    .bar.bad .barFill{ background: var(--bad); }

    .hint{ font-size: 12px; color: var(--muted); line-height: 1.35; padding-bottom: 10px; }
    .camBox{ margin-top: 10px; background: #000; border-top: 1px solid var(--outline); border-bottom: 1px solid var(--outline); position:relative; aspect-ratio: 9 / 16; max-height: 50vh; overflow:hidden; }
    video{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
    .overlay{ position:absolute; inset:0; pointer-events:none; display:flex; align-items:center; justify-content:center; }
    .crosshair{ width: 80px; height: 80px; border-radius: 999px; border: 2px solid rgba(255,255,255,.4); position:relative; }
    .crosshair:before{ content:""; position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); background: rgba(255,255,255,.4); width:2px; height:40px; }
    .crosshair:after{ content:""; position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); background: rgba(255,255,255,.4); height:2px; width:40px; }

    .banner{ position:absolute; top: 10px; left: 10px; right: 10px; display:flex; gap:10px; align-items:center; justify-content:space-between; padding: 10px 12px; border-radius: 14px; background: rgba(17,24,39,.9); border:1px solid var(--outline); font-size: 13px; z-index: 5; }
    .badge{ padding: 6px 10px; border-radius: 999px; border:1px solid var(--outline); background: rgba(0,0,0,.22); font-weight:700; font-size:12px; }
    .badge.good{ color: var(--good); } .badge.bad{ color: var(--bad); } .badge.warn{ color: var(--warn); }

    .controls{ position: fixed; left: 0; right: 0; bottom: 0; padding: 10px 12px calc(10px + env(safe-area-inset-bottom)); background: rgba(7,10,15,.9); backdrop-filter: blur(15px); border-top: 1px solid var(--outline); z-index: 100; }
    .controls .inner{ max-width: 720px; margin: 0 auto; display:grid; gap:8px; }
    .btnRow{ display:grid; grid-template-columns: 1fr 1fr; gap:8px; }
    button{ height: var(--tap); border-radius: var(--btnRadius); border: 1px solid var(--outline); background: rgba(15,23,42,.85); color: var(--text); font-weight: 800; font-size: 14px; cursor: pointer; }
    button:active{ transform: scale(0.98); }
    button:disabled{ opacity:.3; cursor: not-allowed; }
    .btnBlue{ background: var(--blue); border:none; }
    .btnPurple{ background: var(--purple); border:none; }
    .btnRed{ background: rgba(239,68,68,0.2); color: var(--red); border-color: var(--red); }
    .btnGreen{ background: var(--green); border:none; color: #000; }
    .full{ grid-column: 1 / -1; }

    .toast{ position: fixed; left: 12px; right: 12px; top: 20px; z-index: 1000; padding: 15px; border-radius: 14px; background: var(--panel); border: 1px solid var(--outline); display:none; animation: slideDown 0.3s ease-out; }
    @keyframes slideDown { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    .modalBackdrop{ position: fixed; inset:0; background: rgba(0,0,0,0.8); display:none; align-items:center; justify-content:center; z-index: 500; padding: 15px; }
    .modal{ width: 100%; max-width: 500px; background: var(--panel); border-radius: var(--radius); border: 1px solid var(--outline); overflow:hidden; }
    .modalHeader{ padding: 15px; border-bottom: 1px solid var(--outline); font-weight: 800; text-align: center; }
    .modalBody{ padding: 15px; display:grid; gap:8px; }
    .kv{ display:flex; justify-content:space-between; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 10px; font-size: 13px; }
    .modalFooter{ padding: 15px; display:grid; grid-template-columns: 1fr 2fr; gap:10px; }
  </style>
</head>
<body>
  <div class="toast" id="toast"></div>

  <div class="wrap">
    <div class="card">
      <div class="top">
        <div class="row"><input id="jobId" type="text" placeholder="Client Name / Job #" /></div>
        <div class="row"><input id="address" type="text" placeholder="Address / Site Location" /></div>

        <div class="row two">
          <select id="heightSel"></select>
          <div class="metrics" style="padding:5px 10px; flex-direction: row; display: flex; gap: 5px; align-items: center; justify-content: center;">
             <span class="pill"><span class="dot" id="dotCam"></span>Cam</span>
             <span class="pill"><span class="dot" id="dotOri"></span>Tilt</span>
          </div>
        </div>

        <div class="metrics">
          <div class="totalLine">
            <div><span class="total" id="finalTotal">0.00</span><span class="unit">m</span></div>
            <div class="pill" id="anglePill"><span class="dot" id="angleDot"></span><span id="angleLabel">--°</span></div>
          </div>
          <div class="sub">
            <span>Floor: <b id="floorTotal">0.00</b>m</span>
            <span>Vert: <b id="verticalTotal">5.00</b>m</span>
            <span>Sub: <b id="subTotal">0.00</b>m</span>
          </div>
          <div class="statusBar">
            <span class="pill"><span class="dot" id="staticDot"></span><span id="staticLabel">STATIC</span></span>
            <span class="pill">Pts: <b id="pointsCount">0</b></span>
            <span class="pill">Qual: <b id="qualityFlag">OK</b></span>
          </div>
        </div>

        <div class="coach">
          <div class="coachLine"><span id="coachText">Aim at floor point</span><span id="pitchDeg">--</span>°</div>
          <div class="bar" id="coachBar"><div class="barFill" id="barFill"></div></div>
        </div>
      </div>

      <div class="camBox">
        <video id="video" playsinline autoplay muted></video>
        <div class="banner" id="banner">
          <div><b id="bannerTitle">Setup</b><small id="bannerSub">Enable sensors to begin</small></div>
          <div class="badge warn" id="bannerBadge">IDLE</div>
        </div>
        <div class="overlay"><div class="crosshair"></div></div>
      </div>
    </div>
  </div>

  <div class="controls">
    <div class="inner">
      <div class="btnRow">
        <button class="btnBlue" id="btnEnable">ENABLE SENSORS</button>
        <button class="btnRed" id="btnReset">HOLD TO RESET</button>
      </div>
      <div class="btnRow">
        <button class="btnBlue" id="btnAddPoint" disabled>ADD FLOOR POINT</button>
        <button class="btnPurple" id="btnAddVertical">+ 2.5m VERT</button>
      </div>
      <button class="full btnGreen" id="btnReview">REVIEW & SEND</button>
    </div>
  </div>

  <div class="modalBackdrop" id="modalBackdrop">
    <div class="modal">
      <div class="modalHeader">Measurement Summary</div>
      <div class="modalBody" id="modalBody"></div>
      <div class="modalFooter">
        <button onclick="closeModal()">Edit</button>
        <button class="btnGreen" id="btnConfirm">Confirm & Save</button>
      </div>
    </div>
  </div>

  <script>
    /** BOSS EV LOGIC ENGINE **/
    const APPS_SCRIPT_URL = "PASTE_YOUR_GOOGLE_APPS_SCRIPT_URL_HERE"; 
    const BASE_VERTICAL_M = 5.0;
    const BUFFER_PCT = 0.15;
    const ANGLE_MIN = 15;
    const ANGLE_MAX = 75;

    let state = {
      points: [], segments: [], vAdds: 0,
      pitch: 0, yaw: 0, quality: 'OK', 
      isStatic: false, camReady: false, oriReady: false
    };

    // Populate Heights
    const hSel = document.getElementById('heightSel');
    for(let i=60; i<=75; i++) {
        let ft = Math.floor(i/12), inc = i%12;
        let opt = document.createElement('option');
        opt.value = (i * 0.0254).toFixed(3);
        opt.text = `${ft}'${inc}"`;
        if(i===68) opt.selected = true;
        hSel.appendChild(opt);
    }

    async function enableSensors() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            document.getElementById('video').srcObject = stream;
            state.camReady = true;
            document.getElementById('dotCam').style.background = 'var(--good)';

            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                const res = await DeviceOrientationEvent.requestPermission();
                if(res === 'granted') listenOri();
            } else { listenOri(); }
            
            updateUI();
        } catch(e) { alert("Camera/Sensor Access Required"); }
    }

    function listenOri() {
        window.addEventListener('deviceorientation', (e) => {
            state.pitch = Math.abs(e.beta);
            state.yaw = e.alpha;
            state.oriReady = true;
            document.getElementById('dotOri').style.background = 'var(--good)';
            updateUI();
        });
        window.addEventListener('devicemotion', (e) => {
            if(state.isStatic && e.acceleration.x > 5) state.quality = 'RECHECK';
        });
    }

    function updateUI() {
        const p = state.pitch;
        const bar = document.getElementById('barFill');
        const btn = document.getElementById('btnAddPoint');
        
        // Update Coach
        document.getElementById('pitchDeg').innerText = Math.round(p);
        document.getElementById('angleLabel').innerText = Math.round(p) + '°';
        bar.style.width = ((p / 90) * 100) + '%';
        
        const isOk = p >= ANGLE_MIN && p <= ANGLE_MAX;
        document.getElementById('coachBar').className = isOk ? 'bar' : 'bar bad';
        btn.disabled = !isOk || !state.camReady;
        document.getElementById('angleDot').style.background = isOk ? 'var(--good)' : 'var(--bad)';

        // Math
        const floor = state.segments.reduce((a,b) => a+b, 0);
        const vert = BASE_VERTICAL_M + (state.vAdds * 2.5);
        const sub = floor + vert;
        const buf = sub * BUFFER_PCT;
        const fin = sub + buf;

        document.getElementById('floorTotal').innerText = floor.toFixed(2);
        document.getElementById('verticalTotal').innerText = vert.toFixed(2);
        document.getElementById('subTotal').innerText = sub.toFixed(2);
        document.getElementById('bufferM').innerText = buf.toFixed(2);
        document.getElementById('finalTotal').innerText = fin.toFixed(2);
        document.getElementById('pointsCount').innerText = state.points.length;
        document.getElementById('qualityFlag').innerText = state.quality;

        // Banner Logic
        if(!state.camReady) return;
        document.getElementById('bannerTitle').innerText = state.isStatic ? "STATIC MODE ACTIVE" : "READY";
        document.getElementById('bannerSub').innerText = isOk ? "Aim and tap Add Point" : (p < ANGLE_MIN ? "Too far! Move closer." : "Too close! Step back.");
        document.getElementById('bannerBadge').className = isOk ? "badge good" : "badge bad";
        document.getElementById('bannerBadge').innerText = isOk ? "OK" : "BLOCK";
    }

    document.getElementById('btnAddPoint').onclick = () => {
        const h = parseFloat(hSel.value) * 0.93; // eye level approx
        const r = h * Math.tan(state.pitch * (Math.PI/180));
        const current = { r, yaw: state.yaw, pitch: state.pitch };

        if(state.points.length > 0) {
            const prev = state.points[state.points.length-1];
            const dYaw = Math.abs(current.yaw - prev.yaw) * (Math.PI/180);
            const seg = Math.sqrt(prev.r**2 + current.r**2 - 2*prev.r*current.r*Math.cos(dYaw));
            state.segments.push(seg);
        }
        state.points.push(current);
        state.isStatic = true;
        document.getElementById('staticDot').style.background = 'var(--warn)';
        updateUI();
    };

    document.getElementById('btnAddVertical').onclick = () => { state.vAdds++; updateUI(); };

    // Reset Logic
    let timer;
    const btnReset = document.getElementById('btnReset');
    btnReset.onpointerdown = () => {
        timer = setTimeout(() => {
            state = { points: [], segments: [], vAdds: 0, pitch: state.pitch, yaw: state.yaw, quality: 'OK', isStatic: false, camReady: true, oriReady: true };
            document.getElementById('staticDot').style.background = 'var(--muted)';
            updateUI();
            alert("System Reset");
        }, 1000);
    };
    btnReset.onpointerup = () => clearTimeout(timer);

    // Review & Send
    document.getElementById('btnReview').onclick = () => {
        const job = document.getElementById('jobId').value;
        if(!job) return alert("Enter Job Name");
        
        const floor = state.segments.reduce((a,b) => a+b, 0);
        const vert = BASE_VERTICAL_M + (state.vAdds * 2.5);
        const sub = floor + vert;
        const buf = sub * BUFFER_PCT;
        const fin = sub + buf;

        document.getElementById('modalBody').innerHTML = `
            <div class="kv"><span>Client</span><b>${job}</b></div>
            <div class="kv"><span>Floor</span><b>${floor.toFixed(2)}m</b></div>
            <div class="kv"><span>Vertical</span><b>${vert.toFixed(2)}m</b></div>
            <div class="kv"><span>Buffer (15%)</span><b>${buf.toFixed(2)}m</b></div>
            <div class="kv"><span>FINAL TOTAL</span><b style="color:var(--good)">${fin.toFixed(2)}m</b></div>
        `;
        document.getElementById('modalBackdrop').style.display = 'flex';
    };

    window.closeModal = () => document.getElementById('modalBackdrop').style.display = 'none';

    document.getElementById('btnConfirm').onclick = async () => {
        const btn = document.getElementById('btnConfirm');
        btn.disabled = true; btn.innerText = "Saving...";
        
        const payload = {
            timestamp: new Date().toISOString(),
            job_id: document.getElementById('jobId').value,
            address: document.getElementById('address').value,
            final_m: document.getElementById('finalTotal').innerText,
            quality_flag: state.quality,
            device: navigator.userAgent
        };

        try {
            await fetch(APPS_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            alert("Sent to Google Sheets!");
            location.reload();
        } catch(e) { alert("Offline: Saved to device"); }
    };

    document.getElementById('btnEnable').onclick = enableSensors;
  </script>
</body>
</html>
