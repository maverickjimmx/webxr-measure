<!DOCTYPE html>
<html>
<head>
    <title>EV Installation Estimator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; text-align: center; background: #1a1a1a; color: white; font-family: sans-serif; overflow: hidden; }
        #camera-container { position: relative; width: 100vw; height: 100vh; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        #header-ui { position: fixed; top: 0; width: 100%; z-index: 10; background: rgba(0,0,0,0.9); padding: 10px 0; border-bottom: 2px solid #2ecc71; }
        .setup-row { display: flex; justify-content: center; gap: 10px; margin-bottom: 5px; }
        input, select { padding: 8px; border-radius: 5px; border: none; font-size: 14px; }
        
        #crosshair { position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; transform: translate(-50%, -50%); pointer-events: none; }
        .ch-line { position: absolute; background: #2ecc71; }
        .h { top: 19px; width: 100%; height: 2px; }
        .v { left: 19px; height: 100%; width: 2px; }

        #instruction-box { padding: 8px; font-size: 14px; font-weight: bold; transition: 0.3s; }
        .status-good { background: rgba(46, 204, 113, 0.3); color: #2ecc71; }
        .status-warn { background: rgba(231, 76, 60, 0.5); color: #ff9f91; }
        
        #ui-controls { position: fixed; bottom: 20px; width: 100%; z-index: 10; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .btn { padding: 18px; width: 90%; font-size: 18px; font-weight: bold; border-radius: 50px; border: none; cursor: pointer; color: white; }
        #addBtn { background: #3498db; }
        #finishBtn { background: #2ecc71; }
        #resetBtn { background: #444; padding: 10px; width: 40%; font-size: 14px; }
    </style>
</head>
<body>

    <div id="header-ui">
        <div class="setup-row">
            <input type="text" id="job-input" placeholder="Name / Address">
            <select id="height-input">
                <option value="1.5">5'0"</option>
                <option value="1.6" selected>5'3"</option>
                <option value="1.7">5'7"</option>
                <option value="1.8">5'11"</option>
                <option value="1.9">6'3"</option>
            </select>
        </div>
        <div id="instruction-box" class="status-good">Hold phone at Eye Level</div>
        <div style="font-size: 18px; margin-top:5px;">Est. Cable: <span id="total-val">0.00</span>m</div>
    </div>

    <div id="camera-container">
        <video id="webcam" autoplay playsinline></video>
        <div id="crosshair"><div class="ch-line h"></div><div class="ch-line v"></div></div>
    </div>

    <div id="ui-controls">
        <button id="addBtn" class="btn">ADD POINT ON FLOOR</button>
        <button id="finishBtn" class="btn">SEND ESTIMATE TO US</button>
        <button id="resetBtn" class="btn">RESTART</button>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const totalDisplay = document.getElementById('total-val');
        const instruction = document.getElementById('instruction-box');
        const addBtn = document.getElementById('addBtn');
        
        let totalPathLength = 0;
        let lastPoint = null;
        let currentTilt = 0;
        let currentRotation = 0;

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(s => video.srcObject = s);

        window.addEventListener('deviceorientation', (e) => {
            currentTilt = e.beta;
            currentRotation = e.alpha;
            updateWarning();
        }, true);

        function updateWarning() {
            // Beta angle is usually 0 when vertical, 90 when horizontal.
            // We want the client between 15 and 70 degrees for accuracy.
            if (currentTilt < 15) {
                instruction.innerText = "⚠ TOO FAR: Walk closer to the wall";
                instruction.className = "status-warn";
                addBtn.disabled = true;
                addBtn.style.opacity = "0.5";
            } else if (currentTilt > 75) {
                instruction.innerText = "⚠ TOO CLOSE: Step back from the wall";
                instruction.className = "status-warn";
                addBtn.disabled = true;
                addBtn.style.opacity = "0.5";
            } else {
                instruction.innerText = lastPoint ? "Aim at Meter base and click Add" : "Aim at Charger base and click Add";
                instruction.className = "status-good";
                addBtn.disabled = false;
                addBtn.style.opacity = "1";
            }
        }

        document.getElementById('addBtn').onclick = () => {
            let h = parseFloat(document.getElementById('height-input').value);
            let angleRad = currentTilt * (Math.PI / 180);
            let distToPoint = Math.abs(h * Math.tan(angleRad));
            let newPoint = { d: distToPoint, r: currentRotation };

            if (lastPoint) {
                let angleDiff = Math.abs(lastPoint.r - newPoint.r) * (Math.PI / 180);
                let segmentLength = Math.sqrt(Math.pow(lastPoint.d, 2) + Math.pow(newPoint.d, 2) - 2 * lastPoint.d * newPoint.d * Math.cos(angleDiff));
                totalPathLength += segmentLength;
                totalDisplay.innerText = totalPathLength.toFixed(2);
            }
            lastPoint = newPoint;
        };

        document.getElementById('finishBtn').onclick = () => {
            const job = document.getElementById('job-input').value;
            if (!job) return alert("Please enter your name or address.");
            let finalValue = ((totalPathLength + 5) * 1.15).toFixed(2);
            if(confirm(`Send estimate of ${finalValue}m?`)) {
                sendToServer(job, finalValue);
            }
        };

        document.getElementById('resetBtn').onclick = () => {
            totalPathLength = 0; lastPoint = null;
            totalDisplay.innerText = "0.00";
        };

        function sendToServer(job, val) {
            const scriptURL = 'https://script.google.com/macros/s/AKfycbwLI_UP4Zjn2WoKhojrOYKMkAQx7ximSuo1iJY2m9UhEZVe007qa5PUE3iRTVGFxWtp/exec';
            fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ clientId: job, measurement: val })
            }).then(() => alert("Estimate sent successfully!"));
        }
    </script>
</body>
</html>
