<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>BOSS EV – B2B OIF (Full Pro)</title>
<style>
  :root {
    --bg: #0f172a; --panel: #1e293b; --text: #f1f5f9; --muted: #94a3b8;
    --good: #22c55e; --blue: #3b82f6; --danger: #ef4444; --purple: #a855f7;
    --outline: rgba(255,255,255,0.1); --radius: 12px;
  }
  body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; padding-bottom: 100px; }
  .section { background: #111827; padding: 15px; border-radius: var(--radius); border: 1px solid var(--outline); margin-bottom: 20px; }
  h1 { font-size: 20px; color: var(--good); margin-bottom: 20px; text-align: center; }
  h2 { font-size: 16px; border-bottom: 1px solid var(--outline); padding-bottom: 5px; margin-top: 0; color: var(--blue); }
  label { font-size: 12px; color: var(--muted); display: block; margin: 10px 0 4px; }
  input, select, textarea { width: 100%; padding: 12px; background: var(--panel); border: 1px solid var(--outline); color: #fff; border-radius: 8px; box-sizing: border-box; }
  
  /* Tracker UI */
  .camBox { position: relative; background: #000; border-radius: 8px; overflow: hidden; aspect-ratio: 9/16; max-height: 400px; margin: 10px 0; }
  video { width: 100%; height: 100%; object-fit: cover; }
  .overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
  .crosshair { width: 40px; height: 40px; border: 2px solid var(--good); border-radius: 50%; }
  .crosshair::before { content:''; position:absolute; top:50%; left:25%; width:50%; height:2px; background:var(--good); }
  .crosshair::after { content:''; position:absolute; left:50%; top:25%; height:50%; width:2px; background:var(--good); }
  
  .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; text-align: center; }
  .metric-card { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; border: 1px solid var(--outline); }
  .big-num { font-size: 20px; font-weight: bold; color: var(--good); display: block; }
  
  .coach-bar { height: 8px; background: #334155; border-radius: 4px; margin: 10px 0; overflow: hidden; }
  .coach-fill { height: 100%; width: 0%; background: var(--good); transition: 0.3s; }
  .coach-fill.bad { background: var(--danger); }

  /* Canvas UI */
  canvas { background: #fff; border-radius: 8px; width: 100%; touch-action: none; margin-top: 5px; }
  .row { display: flex; gap: 10px; margin-bottom: 10px; }
  .row > div { flex: 1; }
  
  button { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin: 5px 0; }
  .primary { background: var(--good); color: #000; }
  .secondary { background: var(--blue); color: #fff; }
  .purple { background: var(--purple); color: #fff; }
  .danger-btn { background: var(--danger); color: #fff; }
</style>
</head>
<body>

<h1>B2B Ocular Inspection Form + EV Pro</h1>

<div class="section">
  <h2>Site Info</h2>
  <label>Client Company</label>
  <select id="client_company"><option>FINSI</option><option>Greenstrum</option></select>
  <label>Site ID / Inspector</label>
  <div class="row">
    <div><input id="site_id" placeholder="Site ID"></div>
    <div><input id="inspector_name" placeholder="Inspector"></div>
  </div>
</div>

<div class="section">
  <h2>EV Pro Tracker (Live)</h2>
  <label>Your Height (Eye Level)</label>
  <select id="heightSel"></select>
  
  <div class="camBox">
    <video id="video" playsinline autoplay muted></video>
    <div class="overlay"><div class="crosshair"></div></div>
  </div>
  
  <div class="coach-bar"><div id="coachFill" class="coach-fill"></div></div>
  <p id="coachText" style="font-size: 12px; text-align: center; color: var(--muted);">Enable sensors to start</p>

  <div class="metrics">
    <div class="metric-card"><span>Floor (m)</span><span class="big-num" id="floorM">0.00</span></div>
    <div class="metric-card"><span>Final (m)</span><span class="big-num" id="finalM">0.00</span></div>
  </div>

  <button class="secondary" id="btnEnable">ENABLE CAMERA & SENSORS</button>
  <div class="row">
    <button class="primary" id="btnAddPoint" disabled>ADD FLOOR POINT</button>
    <button class="purple" id="btnAddVert">+ 2.5m VERT</button>
  </div>
  <button class="danger-btn" id="btnReset">RESET MEASUREMENT</button>
</div>

<div class="section">
  <h2>Electrical Checklist</h2>
  <label>Main Breaker (A)</label>
  <input type="number" id="main_breaker">
  <label>Voltage System</label>
  <select id="system_voltage"><option>230V 1 Phase</option><option>230V 3 Phase</option><option>400V 3 Phase</option></select>
  
  <label>Voltage Readings (V)</label>
  <div class="row">
    <div><input id="v_l1_n" placeholder="L1-N"></div>
    <div><input id="v_l2_n" placeholder="L2-N"></div>
    <div><input id="v_l3_n" placeholder="L3-N"></div>
  </div>
</div>

<div class="section">
  <h2>Layout Sketches</h2>
  <label>Existing Layout Sketch</label>
  <canvas id="sketch1" height="200"></canvas>
  <button class="secondary" onclick="clearCanvas('sketch1')">Clear Sketch</button>
  
  <label>Digital Signature</label>
  <canvas id="signature" height="150"></canvas>
  <button class="secondary" onclick="clearCanvas('signature')">Clear Signature</button>
</div>

<button class="primary" onclick="submitFullForm()" style="font-size: 18px; height: 60px;">SUBMIT FULL OIF</button>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbznkBTqngel2F66-wWJtVlrZMverQeJdlR1oHHjC1E8vOPdUpKYsWdGlYh_jCS7zrf8Fg/exec";

/** STATE & MATH **/
let state = { points: [], segments: [], vAdds: 0, pitch: 0, yaw: 0, quality: 'OK' };
const BASE_VERT = 5.0;
const BUF = 0.15;

// Populate Height Selector
const hSel = document.getElementById('heightSel');
for(let i=60; i<=75; i++){
    let opt = document.createElement('option');
    opt.value = (i*0.0254).toFixed(3);
    opt.text = Math.floor(i/12)+"'"+(i%12)+'"';
    if(i===68) opt.selected = true;
    hSel.appendChild(opt);
}

/** SENSORS **/
async function initSensors() {
    const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    document.getElementById('video').srcObject = stream;
    
    if (typeof DeviceOrientationEvent.requestPermission === 'function') {
        const res = await DeviceOrientationEvent.requestPermission();
        if(res==='granted') window.addEventListener('deviceorientation', handleOri);
    } else {
        window.addEventListener('deviceorientation', handleOri);
    }
}

function handleOri(e) {
    state.pitch = Math.abs(e.beta);
    state.yaw = e.alpha;
    updateTrackerUI();
}

function updateTrackerUI() {
    const p = state.pitch;
    const isOk = p >= 15 && p <= 75;
    const fill = document.getElementById('coachFill');
    const text = document.getElementById('coachText');
    const btn = document.getElementById('btnAddPoint');
    
    fill.style.width = (p/90*100)+'%';
    fill.className = isOk ? 'coach-fill' : 'coach-fill bad';
    text.innerText = isOk ? "Ready to measure" : "Adjust angle (15°-75°)";
    text.style.color = isOk ? "var(--good)" : "var(--danger)";
    btn.disabled = !isOk;

    const floor = state.segments.reduce((a,b)=>a+b, 0);
    const final = (floor + BASE_VERT + (state.vAdds*2.5)) * (1+BUF);
    document.getElementById('floorM').innerText = floor.toFixed(2);
    document.getElementById('finalM').innerText = final.toFixed(2);
}

document.getElementById('btnAddPoint').onclick = () => {
    const h = parseFloat(hSel.value) * 0.94; // Adj for eye level
    const r = h * Math.tan(state.pitch * (Math.PI/180));
    const curr = { r, yaw: state.yaw };
    if(state.points.length > 0) {
        const prev = state.points[state.points.length-1];
        const dY = Math.abs(curr.yaw - prev.yaw) * (Math.PI/180);
        const s = Math.sqrt(prev.r**2 + curr.r**2 - 2*prev.r*curr.r*Math.cos(dY));
        state.segments.push(s);
    }
    state.points.push(curr);
    updateTrackerUI();
};

document.getElementById('btnAddVert').onclick = () => { state.vAdds++; updateTrackerUI(); };
document.getElementById('btnReset').onclick = () => { state.points=[]; state.segments=[]; state.vAdds=0; updateTrackerUI(); };
document.getElementById('btnEnable').onclick = initSensors;

/** CANVAS LOGIC **/
function initCanvas(id) {
    const canvas = document.getElementById(id);
    const ctx = canvas.getContext('2d');
    canvas.width = canvas.offsetWidth;
    let drawing = false;
    const getPos = (e) => {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: clientX - rect.left, y: clientY - rect.top };
    };
    const start = (e) => { drawing = true; ctx.beginPath(); const p=getPos(e); ctx.moveTo(p.x, p.y); };
    const move = (e) => { if(!drawing) return; const p=getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); };
    const stop = () => drawing = false;
    canvas.addEventListener('mousedown', start); canvas.addEventListener('mousemove', move); window.addEventListener('mouseup', stop);
    canvas.addEventListener('touchstart', start); canvas.addEventListener('touchmove', move); window.addEventListener('touchend', stop);
    ctx.lineWidth = 2; ctx.strokeStyle = "#000";
}
function clearCanvas(id) { 
    const c = document.getElementById(id); 
    c.getContext('2d').clearRect(0,0,c.width,c.height); 
}
initCanvas('sketch1');
initCanvas('signature');

/** SUBMISSION **/
async function submitFullForm() {
    const payload = {
        timestamp: new Date().toISOString(),
        site_id: document.getElementById('site_id').value,
        inspector: document.getElementById('inspector_name').value,
        floor_m: document.getElementById('floorM').innerText,
        final_m: document.getElementById('finalM').innerText,
        voltage_l1_n: document.getElementById('v_l1_n').value,
        sketch: document.getElementById('sketch1').toDataURL(),
        signature: document.getElementById('signature').toDataURL()
        // ... add other fields as needed
    };
    
    alert("Submitting... Check Sheet in a moment.");
    fetch(APPS_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) })
    .then(() => { alert("Success!"); location.reload(); });
}
</script>
</body>
</html>
